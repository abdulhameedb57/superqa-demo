<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acme App — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #18181b;
      --border: #27272a;
      --border-focus: #F43F5E;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-placeholder: #52525b;
      --accent: #F43F5E;
      --accent-hover: #e11d48;
      --success: #22c55e;
      --error: #F43F5E;
      --radius: 8px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Logo / brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px;
      width: 100%;
      max-width: 400px;
    }

    .card-header {
      margin-bottom: 28px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 7px;
      letter-spacing: 0.01em;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: var(--text-placeholder);
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--border-focus);
    }

    input.input-error {
      border-color: var(--error);
    }

    .field-error {
      display: none;
      font-size: 12px;
      color: var(--error);
      margin-top: 6px;
    }

    .field-error.visible {
      display: block;
    }

    /* Forgot passwrd */
    .row-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .forgot-link {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }

    .forgot-link:hover {
      color: var(--accent);
    }

    /* Submit */
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, opacity 0.15s;
      position: relative;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
    }

    .btn-primary.loading .spinner { display: block; }

    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    /* Alert banners */
    .alert {
      display: none;
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .alert.visible { display: block; }

    .alert-error {
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.3);
      color: #fda4af;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 12px;
      color: var(--text-placeholder);
    }

    /* Sign up link */
    .signup-row {
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 20px;
    }

    .signup-row a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .signup-row a:hover {
      text-decoration: underline;
    }

    /* Footer */
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--text-placeholder);
      text-align: center;
    }
  </style>
  <!-- Preconnect for Inter from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
</head>
<body>

  <div class="brand">
    <div class="brand-icon">A</div>
    <span class="brand-name">Acme App</span>
  </div>

  <div class="card">
    <div class="card-header">
      <h1 class="card-title">Sign in</h1>
      <p class="card-subtitle">Enter your credentials to access your account.</p>
    </div>

    <!-- Alert banners -->
    <div id="alertError" class="alert alert-error" role="alert"></div>
    <div id="alertSuccess" class="alert alert-success" role="alert"></div>

    <form id="loginForm" novalidate>

      <div class="form-group">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@company.com"
          autocomplete="email"
          data-testid="input-email"
        />
        <span class="field-error" id="emailError">Enter a valid email address.</span>
      </div>

      <div class="form-group">
        <div class="row-between">
          <label for="password">Password</label>
          <a href="#" class="forgot-link" id="forgotLink" data-testid="link-forgot-password">Forgot password?</a>
        </div>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          data-testid="input-password"
        />
        <span class="field-error" id="passwordError">Password must be at least 8 characters.</span>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn" data-testid="btn-signin">
        Sign in
        <span class="spinner"></span>
      </button>

    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <div class="signup-row">
      Don't have an account? <a href="#" data-testid="link-signup">Create one</a>
    </div>
  </div>

  <p class="footer">© 2026 Acme Inc. · <a href="#" style="color:inherit">Privacy</a> · <a href="#" style="color:inherit">Terms</a></p>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const alertError = document.getElementById('alertError');
    const alertSuccess = document.getElementById('alertSuccess');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');

    function clearAlerts() {
      alertError.classList.remove('visible');
      alertSuccess.classList.remove('visible');
      alertError.textContent = '';
      alertSuccess.textContent = '';
    }

    function showError(msg) {
      clearAlerts();
      alertError.textContent = msg;
      alertError.classList.add('visible');
    }

    function showSuccess(msg) {
      clearAlerts();
      alertSuccess.textContent = msg;
      alertSuccess.classList.add('visible');
    }

    function validateEmail(val) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val.trim());
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlerts();

      const email = emailInput.value.trim();
      const password = passwordInput.value;
      let valid = true;

      // Email validation
      if (!email || !validateEmail(email)) {
        emailInput.classList.add('input-error');
        emailError.classList.add('visible');
        valid = false;
      } else {
        emailInput.classList.remove('input-error');
        emailError.classList.remove('visible');
      }

      // Password validation
      if (!password || password.length < 8) {
        passwordInput.classList.add('input-error');
        passwordError.classList.add('visible');
        valid = false;
      } else {
        passwordInput.classList.remove('input-error');
        passwordError.classList.remove('visible');
      }

      if (!valid) return;

      // Simulate API call
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
      submitBtn.querySelector('.spinner').style.display = 'block';

      await new Promise(r => setTimeout(r, 1200));

      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');

      // Demo logic: test@acme.com / password123 = success
      if (email === 'test@acme.com' && password === 'password123') {
        showSuccess('Signed in successfully! Redirecting…');
        setTimeout(() => {
          document.querySelector('.card-title').textContent = 'Welcoming back 👋';
        }, 1500);
      } else {
        showError('Invalid email or password. Try test@acme.com / password123');
      }
    });

    // Clear errors on input
    emailInput.addEventListener('input', () => {
      emailInput.classList.remove('input-error');
      emailError.classList.remove('visible');
    });

    passwordInput.addEventListener('input', () => {
      passwordInput.classList.remove('input-error');
      passwordError.classList.remove('visible');
    });

    document.getElementById('forgotLink').addEventListener('click', (e) => {
      e.preventDefault();
      showError('Password reset is not available in this demo.');
    });
  </script>

</body>
</html>
